<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Qoin 電子回覧板</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            qoin: {
              main: '#38bdf8',     /* 薄いブルー（Sky 400） */
              main_hover: '#0ea5e9', /* 薄いブルーのホバー（Sky 500） */
              yellow: '#FACC15',   /* ロゴの「o」用イエロー */
              gray: '#7A7974',     /* ロゴの文字色に近いグレー */
              gray_dark: '#5C5C59',
              light: '#f0f9ff'     /* 全体の背景色（Sky 50） */
            }
          }
        }
      }
    }
  </script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
    /* スクロールバー非表示（デザイン目的） */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 text-qoin-gray_dark font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const initialCirculars = [
      { id: 1, title: '春の町内清掃・ゴミ拾いのお知らせ', date: '2026-04-10', content: '4月10日（日）午前9時より、町内公園の清掃と周辺のゴミ拾いを行います。\n各自、軍手とゴミ袋をご持参の上、公園前に集合してください。\n※雨天の場合は翌週に延期します。', author: '環境美化委員', isRead: false, readCount: 45, totalCount: 100 },
      { id: 2, title: '令和8年度 町内会・自治会費集金について', date: '2026-04-01', content: '今年度の町内会・自治会費（年間3,000円）につきまして、「Qoin」上での電子決済でのお支払いが可能になりました。\n役員による戸別訪問での集金も引き続き行いますが、なるべく電子決済へのご協力をお願いいたします。', author: '会計担当', isRead: true, readCount: 80, totalCount: 100 },
      { id: 3, title: '防犯パトロール参加者募集', date: '2026-03-25', content: '毎週水曜日の夜に行っている防犯パトロールのボランティアメンバーを募集しています。\n少しの時間でも構いませんので、可能な方はご連絡ください。', author: '防犯委員', isRead: true, readCount: 92, totalCount: 100 }
    ];

    function ResidentView({ circulars, onMarkAsRead, townName }) {
      const [selectedCircular, setSelectedCircular] = useState(null);

      if (selectedCircular) {
        return (
          <div className="w-full h-full bg-white relative pb-20 overflow-y-auto hide-scrollbar">
            <div className="bg-white text-qoin-gray_dark p-4 flex items-center sticky top-0 shadow-sm border-b-4 border-qoin-main z-10 w-full">
              <button onClick={() => setSelectedCircular(null)} className="mr-4 text-xl p-2 hover:text-qoin-main transition"><i className="fas fa-arrow-left"></i></button>
              <h1 className="text-lg font-bold">詳細を開く</h1>
            </div>
            <div className="p-5">
              <span className="text-xs bg-sky-100 text-qoin-main px-3 py-1 rounded-full font-bold mb-3 inline-block shadow-sm">{selectedCircular.date}</span>
              <h2 className="text-2xl font-bold mb-4 text-gray-800 leading-tight">{selectedCircular.title}</h2>
              <div className="flex items-center text-gray-500 text-sm mb-6">
                <i className="fas fa-user-circle mr-2 text-lg text-qoin-gray"></i>
                <span className="font-bold">差出人：{selectedCircular.author}</span>
              </div>
              <div className="bg-sky-50 border border-sky-100 p-5 rounded-2xl mb-8 whitespace-pre-wrap text-base leading-relaxed text-gray-700 shadow-inner">
                {selectedCircular.content}
              </div>
              
              {!selectedCircular.isRead ? (
                <button 
                  onClick={() => {
                    onMarkAsRead(selectedCircular.id);
                    setSelectedCircular({...selectedCircular, isRead: true});
                  }}
                  className="w-full bg-qoin-main text-white font-black text-lg py-4 rounded-xl shadow-lg hover:bg-qoin-main_hover transition flex items-center justify-center transform active:scale-95"
                >
                  <i className="fas fa-check-circle mr-2 text-xl"></i> 確認しました（既読）
                </button>
              ) : (
                <div className="w-full bg-gray-200 text-gray-500 font-bold text-lg py-4 rounded-xl flex items-center justify-center">
                  <i className="fas fa-check mr-2"></i> 確認済みです
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="w-full h-full bg-qoin-light relative overflow-y-auto hide-scrollbar">
          <div className="bg-white p-4 text-center sticky top-0 shadow-sm border-b-[5px] border-qoin-main z-10 w-full mb-2 flex flex-col items-center justify-center">
             <h1 className="text-xl font-black text-gray-800 tracking-tight mb-1">
               {townName}町内会・自治会 <span className="text-gray-500 font-bold text-lg">回覧板</span>
             </h1>

          </div>
          <div className="p-5 space-y-4 pb-24">
            <p className="text-qoin-gray text-sm mb-1 font-bold tracking-wide">新着のお知らせ</p>
            {circulars.map(circular => (
              <div 
                key={circular.id} 
                onClick={() => setSelectedCircular(circular)}
                className={`p-5 rounded-2xl shadow-sm cursor-pointer transition transform hover:scale-[1.02] active:scale-95 ${circular.isRead ? 'bg-white opacity-90 border border-gray-100' : 'bg-white border-l-8 border-qoin-main shadow-md'}`}
              >
                <div className="flex justify-between items-start mb-2">
                  <span className="text-xs text-gray-400 font-bold">{circular.date}</span>
                  {!circular.isRead && <span className="bg-qoin-main text-white text-[10px] px-3 py-1 rounded-full font-black animate-pulse shadow-sm">未読</span>}
                </div>
                <h3 className={`font-bold text-[17px] mb-2 leading-snug ${circular.isRead ? 'text-gray-500' : 'text-gray-800'}`}>{circular.title}</h3>
                <p className="text-gray-400 text-sm truncate">{circular.content}</p>
              </div>
            ))}
          </div>
          {/* 画面右下へのロゴ配置（スマホ用） */}
          <div className="absolute bottom-[84px] right-4 z-10 opacity-70 flex flex-col items-end pointer-events-none">
             <div className="text-[9px] text-gray-500 font-bold mb-0.5 tracking-wider">Powered by</div>
             <img src="qoin-logo.png" alt="Qoin" className="h-6 object-contain drop-shadow-sm" />
          </div>
          <div className="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 pb-6 text-xs text-gray-400 font-bold shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-20">
              <div className="flex flex-col items-center text-qoin-main"><i className="fas fa-home text-xl mb-1"></i>ホーム</div>
              <div className="flex flex-col items-center hover:text-qoin-gray"><i className="far fa-credit-card text-xl mb-1"></i>支払い</div>
              <div className="flex flex-col items-center hover:text-qoin-gray"><i className="far fa-calendar-alt text-xl mb-1"></i>イベント</div>
          </div>
        </div>
      );
    }

    function AdminView({ circulars, townName }) {
      return (
        <div className="max-w-4xl mx-auto bg-white min-h-screen shadow-2xl md:rounded-2xl overflow-hidden p-6 md:p-8 m-0 md:m-4 relative">

          <div className="flex justify-between items-center mb-8 border-b-2 border-gray-100 pb-5 pt-4">
            <h1 className="text-2xl md:text-3xl font-black text-gray-800 tracking-tight flex flex-col md:flex-row md:items-baseline">
              <span>{townName}町内会・自治会</span>
              <span className="text-lg md:text-xl font-bold text-gray-500 md:ml-3 mt-1 md:mt-0">ダッシュボード</span>
            </h1>
            <button 
              className="bg-qoin-main text-white px-6 py-3 rounded-xl shadow-md font-black hover:bg-qoin-main_hover hover:shadow-lg transition transform active:scale-95 text-sm md:text-base hidden md:block"
              onClick={() => alert("※プロトタイプのため新規作成画面への移動はモックアップです")}
            >
              <i className="fas fa-plus mr-2"></i>回覧板を新規作成
            </button>
            <button 
              className="bg-qoin-main text-white w-12 h-12 rounded-full shadow-md font-black hover:bg-qoin-main_hover transition transform active:scale-95 md:hidden flex items-center justify-center cursor-pointer"
              onClick={() => alert("※プロトタイプのため新規作成画面への移動はモックアップです")}
            >
              <i className="fas fa-plus text-xl"></i>
            </button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
             <div className="bg-sky-50 rounded-2xl p-6 border border-sky-100 shadow-sm text-center">
                 <div className="text-sky-600 font-bold mb-2">今月の配信数</div>
                 <div className="text-4xl font-black text-qoin-main_hover">3<span className="text-xl font-normal ml-1">件</span></div>
             </div>
             <div className="bg-sky-50 rounded-2xl p-6 border border-sky-100 shadow-sm text-center">
                 <div className="text-sky-600 font-bold mb-2">平均回覧率</div>
                 <div className="text-4xl font-black text-qoin-main_hover">85<span className="text-xl font-normal ml-1">%</span></div>
             </div>
             <div className="bg-orange-50 rounded-2xl p-6 border border-orange-200 shadow-sm text-center relative overflow-hidden">
                 <div className="absolute top-0 right-0 w-16 h-16 bg-orange-400 rounded-bl-[100px] opacity-20"></div>
                 <div className="text-orange-700 font-bold mb-2 relative z-10">未納の会費</div>
                 <div className="text-4xl font-black text-orange-600 relative z-10">12<span className="text-xl font-normal ml-1">件</span></div>
             </div>
          </div>

          <h2 className="text-xl font-bold text-qoin-gray_dark mb-5 flex items-center"><i className="fas fa-list-ul mr-2 text-qoin-gray"></i>配信履歴</h2>
          <div className="bg-white border rounded-2xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse min-w-max">
                <thead>
                  <tr className="bg-gray-50 text-gray-500 text-sm border-b">
                    <th className="p-4 font-bold">配信日</th>
                    <th className="p-4 font-bold">タイトル</th>
                    <th className="p-4 font-bold">差出人</th>
                    <th className="p-4 font-bold text-center">既読状況</th>
                    <th className="p-4 font-bold text-center">操作</th>
                  </tr>
                </thead>
                <tbody>
                  {circulars.map(c => {
                     const readPercent = Math.round((c.readCount / c.totalCount) * 100);
                     return (
                    <tr key={c.id} className="hover:bg-sky-50 border-b last:border-b-0 transition">
                      <td className="p-4 text-gray-500 text-sm font-semibold">{c.date}</td>
                      <td className="p-4 font-bold text-qoin-gray_dark text-md max-w-[200px] truncate">{c.title}</td>
                      <td className="p-4 text-gray-600 text-sm"><i className="fas fa-user-circle mr-1 text-qoin-main"></i>{c.author}</td>
                      <td className="p-4 text-center">
                        <div className="flex items-center justify-center">
                            <div className="w-24 bg-gray-200 rounded-full h-3 mr-3 shadow-inner">
                              <div className={`h-3 rounded-full ${readPercent < 50 ? 'bg-orange-400' : 'bg-qoin-main'}`} style={{width: `${readPercent}%`}}></div>
                            </div>
                            <span className="text-sm font-bold w-12 text-right text-gray-600">{readPercent}%</span>
                        </div>
                      </td>
                      <td className="p-4 text-center">
                        <button className="text-qoin-gray_dark hover:text-black font-bold text-xs border-2 border-gray-200 hover:border-gray-300 bg-white px-3 py-2 rounded-xl transition shadow-sm hover:shadow">詳細確認</button>
                      </td>
                    </tr>
                  )})}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    function AdminWatermark() {
      return (
        <div className="fixed bottom-6 right-8 z-50 opacity-70 hidden md:flex flex-col items-end pointer-events-none">
           <div className="text-[12px] text-gray-500 font-bold mb-1 tracking-widest">Powered by</div>
           <img src="qoin-logo.png" alt="Qoin" className="h-9 object-contain drop-shadow-sm" />
        </div>
      );
    }

    function App() {
      const [view, setView] = useState('resident'); 
      const [circulars, setCirculars] = useState(initialCirculars);
      // LINE連携（LIFF）の状態管理
      const [liffState, setLiffState] = useState({ initialized: false, isInClient: false, profile: null });
      
      // 町名の設定（ここを変更するとすべての画面の町名が変わります。「〇〇」などを代入可能）
      const townName = "希望ヶ丘";

      // LIFFの初期化処理
      React.useEffect(() => {
        try {
          // ※実運用では "YOUR_LIFF_ID" にLINE Developersで発行したIDを入れます
          liff.init({ liffId: "2009700969-4emj7NXD" }).then(() => {
            const inClient = liff.isInClient();
            if (inClient) {
               // LINEアプリ内で開かれている場合は強制的に住民用スマホビューにする
               setView('resident');
               // LINEのプロフィール情報を取得
               liff.getProfile().then(profile => {
                 setLiffState({ initialized: true, isInClient: true, profile });
               }).catch(e => {
                 setLiffState({ initialized: true, isInClient: true, profile: null });
               });
            } else {
               setLiffState({ initialized: true, isInClient: false, profile: null });
            }
          }).catch((err) => {
            console.log("LIFF初期化エラー (ID未指定など):", err);
            setLiffState({ initialized: true, isInClient: false, profile: null });
          });
        } catch(e) {
          console.log("LIFF未読込");
        }
      }, []);

      const handleMarkAsRead = (id) => {
        setCirculars(prev => prev.map(c => 
          c.id === id ? { ...c, isRead: true, readCount: c.readCount + 1 } : c
        ));
      };

      return (
        <div className="bg-[#e4e4e4] min-h-screen font-sans flex flex-col">
          
          {/* LINEアプリ内で開いている場合は切り替えメニューを非表示にする（スマホ専用画面とするため） */}
          {!liffState.isInClient && (
            <div className="bg-qoin-gray_dark p-3 text-center text-white text-sm z-50 relative shadow-md flex justify-center items-center flex-wrap gap-3">
               <span className="font-bold text-gray-300 hidden md:inline"><i className="fas fa-magic mr-2 text-qoin-main"></i>デザインプロトタイプ</span>
               <button 
                 className={`px-5 py-2 rounded-xl font-bold transition flex items-center ${view === 'resident' ? 'bg-qoin-main text-white shadow-lg' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
                 onClick={() => setView('resident')}
               >
                 <i className="fas fa-mobile-alt mr-2 text-lg"></i>スマホ（住民）画面
               </button>
               <button 
                 className={`px-5 py-2 rounded-xl font-bold transition flex items-center ${view === 'admin' ? 'bg-qoin-main text-white shadow-lg' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
                 onClick={() => setView('admin')}
               >
                 <i className="fas fa-desktop mr-2 text-lg"></i>PC（管理者）画面
               </button>
            </div>
          )}

          <div className="flex-1 flex justify-center items-start pt-0 md:pt-10 pb-10 relative">
             {/* LINEプロフィールのプレビュー（LINEアプリ内であれば左上にアイコンが出ます） */}
             {liffState.profile && (
               <div className="absolute top-4 left-4 bg-white/90 p-2 rounded-xl text-xs font-bold text-gray-700 z-50 flex items-center shadow-lg backdrop-blur-sm border border-gray-100">
                 <img src={liffState.profile.pictureUrl} className="w-6 h-6 rounded-full mr-2 shadow-inner" />
                 <span>{liffState.profile.displayName}さん</span>
               </div>
             )}
             {view === 'resident' ? (
               <div className="w-full h-[100dvh] md:w-[390px] md:h-[844px] md:rounded-[3rem] overflow-hidden md:border-[12px] md:border-gray-800 md:shadow-2xl relative bg-white flex flex-col">
                 <ResidentView circulars={circulars} onMarkAsRead={handleMarkAsRead} townName={townName} />
               </div>
             ) : (
               <div className="w-full max-w-5xl">
                 <AdminView circulars={circulars} townName={townName} />
                 <AdminWatermark />
               </div>
             )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
