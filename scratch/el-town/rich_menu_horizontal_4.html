<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>LINE Rich Menu (4 Items Horizontal)</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 405px; /* ハーフサイズか、あるいは任意の縦横比 */
      background: #ffffff;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 20px;
    }
    .menu-container {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 20px;
    }
    .menu-item {
      background: #ffffff;
      border: 2px solid #eef2f6;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }
    .icon-img {
      height: 120px;
      margin-bottom: 30px;
    }
    /* FontAwesomeを画像代わりに使う場合のスタイル */
    .icon-wrapper {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }
    .fa-icon {
      font-size: 90px;
    }
    /* それぞれのカラー */
    .color-member { color: #438ee2; }
    .color-admin { color: #1e874b; }
    .color-portal { color: #f97316; } /* Tailwind Orange-500 */
    .color-manual { color: #6b7280; } /* Tailwind Gray-500 */

    /* マイel-townだけの特別感（少しグラデーション） */
    .color-portal-grad {
      background: linear-gradient(135deg, #fb923c 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title {
      font-size: 34px;
      font-weight: 900;
      color: #2c3e50;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 18px;
      font-weight: bold;
      color: #64748b;
      letter-spacing: 1px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="menu-container">
    
    <!-- 1: 会員の方 -->
    <div class="menu-item">
      <div class="icon-wrapper color-member">
        <i class="fas fa-clipboard-list fa-icon"></i>
      </div>
      <div class="title">会員の方</div>
      <div class="subtitle">回覧板・新規登録</div>
    </div>

    <!-- 2: 役員の方 -->
    <div class="menu-item">
      <div class="icon-wrapper color-admin">
        <i class="fas fa-user-tie fa-icon"></i>
      </div>
      <div class="title">役員の方</div>
      <div class="subtitle">管理画面を開く</div>
    </div>

    <!-- 3: マイel-town (新規追加) -->
    <div class="menu-item" style="border-color: #ffedd5; background: #fffaf5;">
      <div class="icon-wrapper color-portal-grad">
        <i class="fas fa-map-marked-alt fa-icon"></i>
      </div>
      <div class="title">マイel-town</div>
      <div class="subtitle">全国交流ポータル</div>
    </div>

    <!-- 4: 操作方法 -->
    <div class="menu-item">
      <div class="icon-wrapper color-manual">
        <i class="fas fa-mobile-alt fa-icon"></i>
      </div>
      <div class="title">操作方法</div>
      <div class="subtitle">マニュアル・ヘルプ</div>
    </div>

  </div>
</body>
</html>
